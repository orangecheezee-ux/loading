name: Render PulsePanel jar

on:
  push:
    branches: [main]
    paths:
      - 'pulsepanel.jar.b64'
      - 'update.json'
      - '.github/workflows/render-jar.yml'

permissions:
  contents: write

jobs:
  render:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode jar and sync checksum
        run: |
          python3 - <<'PY'
          import base64, hashlib, json
          from pathlib import Path

          raw = base64.b64decode(Path('pulsepanel.jar.b64').read_text().strip())
          Path('pulsepanel.jar').write_bytes(raw)
          sha = hashlib.sha256(raw).hexdigest()

          update = json.loads(Path('update.json').read_text())
          update['sha256'] = sha
          Path('update.json').write_text(json.dumps(update, separators=(',', ':')))
          PY

      - name: Commit rendered jar
        run: |
          if git diff --quiet -- pulsepanel.jar update.json; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pulsepanel.jar update.json
          git commit -m 'Render pulsepanel.jar from base64'
          git push
